<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VibeAtelier | Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfaf5; --ink: #4a4a4a; --accent: #d9e4f7; --gold: #d4af37; --pattern: #e2d1c3; }
        body { background: #f0ece2; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; color: var(--ink); }
        
        .stats-bar { display: flex; gap: 20px; margin: 15px; padding: 12px 35px; background: white; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .score-box { font-weight: bold; color: var(--ink); font-size: 1.1rem; }
        .shop-btn { cursor: pointer; color: var(--gold); font-weight: bold; text-decoration: underline; }

        #atelier-main { display: none; background: var(--paper); box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; animation: fadeIn 1s; margin-top: 10px; }
        .tools { display: flex; gap: 8px; padding: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; max-width: 600px; justify-content: center; }
        
        button { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        button:hover { background: var(--accent); }
        button.active { background: var(--accent); border-color: #6a7a8a; }

        canvas { background: white; border: 1px solid #eee; cursor: crosshair; display: block; }

        #shop-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.3); z-index: 1000; width: 350px; }
        .shop-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .unlocked-item { color: #2ecc71; font-weight: bold; }
        .locked-item { color: #e74c3c; opacity: 0.6; }

        #universe-feed { width: 90%; max-width: 600px; margin-top: 30px; display: flex; flex-direction: column-reverse; gap: 15px; margin-bottom: 50px; }
        .feed-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-left: 5px solid var(--accent); animation: slideUp 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="score-box">✨ Yankı: <span id="score">0</span></div>
        <div class="shop-btn" onclick="toggleShop()">🏪 Koleksiyon & Gelişim</div>
    </div>

    <div id="atelier-main">
        <div class="tools">
            <input type="color" id="brushColor" onchange="currentMode='brush'; currentColor=this.value" title="Renk Seç">
            <input type="range" id="brushSize" min="1" max="60" value="3" onchange="currentSize=this.value" title="Boyut">
            <button onclick="setMode('brush')" id="btn-brush">🖋 Mürekkep</button>
            <span id="extra-brushes"></span>
            <span id="extra-shapes"></span>
            <button onclick="setMode('eraser')">🧽 Silgi</button>
            <button onclick="undo()">↩ Geri</button>
        </div>
        <canvas id="canvas" width="600" height="350"></canvas>
    </div>

    <div class="ui-panel" style="margin-top: 20px; text-align: center;">
        <input type="text" id="mottoInput" style="width: 400px; padding: 15px; border: none; border-bottom: 2px solid #ddd; background: transparent; font-family: 'Zen Old Mincho', serif; font-size: 1.2rem; outline: none;" placeholder="İçinden geçen güzellikleri evrene bırak...">
        <br><br>
        <button onclick="sendToUniverse()" style="padding: 12px 40px; border-radius: 30px; border: none; background: var(--accent); cursor: pointer; font-weight: bold;">Evrene Gönder</button>
        <p id="unlock-hint" style="font-size: 0.85rem; color: #8b7d6b; margin-top: 15px; font-style: italic;">İlk gizemli kilit için 100 puan topla...</p>
    </div>

    <div id="shop-overlay">
        <h3 style="font-family: 'Zen Old Mincho', serif;">Atölye Koleksiyonu</h3>
        <div id="shop-list"></div>
        <button onclick="toggleShop()" style="margin-top: 20px; width: 100%; background: #eee; border: none; padding: 10px; border-radius: 10px; cursor: pointer;">Kapat</button>
    </div>

    <div id="universe-feed"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let painting = false;
        let currentMode = 'brush';
        let currentColor = '#4a4a4a';
        let currentSize = 3;
        let history = [];

        const unlocks = [
            { pts: 100, id: 'canvas', name: "Sanat Alanı", desc: "Tuval ve temel mürekkep açıldı." },
            { pts: 300, id: 'watercolor', name: "Sulu Boya", desc: "Şeffaf sanatsal dokunuşlar." },
            { pts: 500, id: 'spray', name: "Püskürtme", desc: "Sprey efekti ve doku." },
            { pts: 700, id: 'shapes', name: "Kutsal Şekiller", desc: "Kalp, Yıldız ve Geometrik formlar." },
            { pts: 1000, id: 'gold', name: "Altın Mürekkep", desc: "Işıltılı ve asil bir doku." },
            { pts: 1500, id: 'patterns', name: "Estetik Desenler", desc: "Çiçekli ve geometrik damgalar." }
        ];

        function sendToUniverse() {
            const input = document.getElementById('mottoInput');
            if(!input.value) return;
            score += 70 + (input.value.length * 3);
            document.getElementById('score').innerText = score;
            checkUnlocks();
            addToFeed(input.value);
            input.value = "";
        }

        function checkUnlocks() {
            unlocks.forEach(u => {
                if(score >= u.pts) {
                    if(u.id === 'canvas') document.getElementById('atelier-main').style.display = 'block';
                    if(u.id === 'watercolor') addTool('Sulu Boya', 'watercolor', 'extra-brushes');
                    if(u.id === 'spray') addTool('Püskürtme', 'spray', 'extra-brushes');
                    if(u.id === 'gold') addTool('✨ Altın', 'gold', 'extra-brushes');
                    if(u.id === 'shapes') {
                        addTool('❤', 'heart', 'extra-shapes');
                        addTool('⭐', 'star', 'extra-shapes');
                        addTool('⭕', 'circle', 'extra-shapes');
                        addTool('⬛', 'square', 'extra-shapes');
                    }
                    if(u.id === 'patterns') {
                        addTool('🌸', 'flower', 'extra-shapes');
                        addTool('💠', 'deco', 'extra-shapes');
                    }
                }
            });
            let next = unlocks.find(u => score < u.pts);
            document.getElementById('unlock-hint').innerText = next ? `${next.pts} puan olunca "${next.name}" açılacak...` : "Tüm atölye araçları açıldı. Sen bir ustasın!";
        }

        function addTool(name, mode, containerId) {
            if(!document.getElementById('btn-'+mode)) {
                const btn = document.createElement('button');
                btn.id = 'btn-'+mode;
                btn.innerText = name;
                btn.onclick = () => setMode(mode);
                document.getElementById(containerId).appendChild(btn);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            if(mode === 'gold') currentColor = '#d4af37';
            if(mode === 'brush' || mode === 'watercolor' || mode === 'spray') {
                 // Renk seçiciden gelen rengi koru (altın değilse)
                 if(mode !== 'gold') currentColor = document.getElementById('brushColor').value;
            }
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+mode)?.classList.add('active');
        }

        // Çizim Motoru
        canvas.addEventListener('mousedown', (e) => { saveState(); painting = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });

        function draw(e) {
            if(!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            
            if(['brush', 'watercolor', 'gold', 'eraser'].includes(currentMode)) {
                ctx.strokeStyle = currentMode === 'eraser' ? '#ffffff' : currentColor;
                ctx.globalAlpha = currentMode === 'watercolor' ? 0.15 : 1;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(currentMode === 'spray') {
                ctx.fillStyle = currentColor;
                for(let i=0; i<20; i++) {
                    ctx.fillRect(x + Math.random()*30-15, y + Math.random()*30-15, 1, 1);
                }
            } else {
                // Şekil ve Desen Damgaları
                const icons = { heart: '❤', star: '⭐', circle: '⭕', square: '⬛', flower: '🌸', deco: '💠' };
                if(icons[currentMode]) {
                    ctx.globalAlpha = 1;
                    ctx.font = `${currentSize * 5}px serif`;
                    ctx.fillStyle = currentColor;
                    ctx.fillText(icons[currentMode], x - (currentSize*2), y + (currentSize*2));
                    painting = false; // Tek tıklama damga
                }
            }
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function addToFeed(thought) {
            const feed = document.getElementById('universe-feed');
            const responses = [
                "Çizgilerindeki zarafet, kelimelerinin derinliğiyle birleşmiş.",
                "Bu eser, evrenin tozlu raflarında parlayan bir mücevher gibi.",
                "Söylenemeyenleri bu kadar estetik anlatman büyüleyici.",
                "Bir ruhun fısıltısı, diğerine umut olur. Teşekkürler.",
                "Altın dokunuşların ve desenlerin harika bir denge kurmuş."
            ];
            const card = document.createElement('div');
            card.className = 'feed-card';
            card.innerHTML = `<strong>"${thought}"</strong><br><small style="color:#7a8a9a;">✨ ${responses[Math.floor(Math.random()*responses.length)]}</small>`;
            feed.appendChild(card);
        }

        function toggleShop() {
            const shop = document.getElementById('shop-overlay');
            shop.style.display = shop.style.display === 'block' ? 'none' : 'block';
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = "";
            unlocks.forEach(u => {
                const isUnlocked = score >= u.pts;
                list.innerHTML += `<div class="shop-item ${isUnlocked ? 'unlocked-item' : 'locked-item'}">
                    <span>${isUnlocked ? '✅' : '🔒'} ${u.name}</span>
                    <span>${u.pts}</span>
                </div>`;
            });
        }

        function saveState() { history.push(canvas.toDataURL()); if(history.length > 15) history.shift(); }
        function undo() { if(history.length > 0) { let img = new Image(); img.src = history.pop(); img.onload = () => { ctx.clearRect(0,0,600,350); ctx.drawImage(img,0,0); }; } }
    </script>
</body>
</html>
