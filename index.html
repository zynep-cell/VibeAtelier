<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VibeAtelier | Gelişmiş Atölye</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfaf5;
            --ink: #4a4a4a;
            --accent: #d9e4f7;
        }

        body {
            background: #f0ece2;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
        }

        /* Üst Panel */
        .header-stats {
            margin: 20px;
            padding: 10px 25px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Çizim Alanı ve Araçlar */
        #canvas-container {
            position: relative;
            background: var(--paper);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
        }

        canvas { border: 1px solid #eee; cursor: crosshair; background: white; }

        /* UI Elemanları */
        .ui-panel {
            margin-top: 25px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-bottom: 2px solid #d1ccc0;
            background: transparent;
            font-family: 'Zen Old Mincho', serif;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .action-btns button {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #d1ccc0;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 5px;
        }

        button:hover { background: var(--accent); }

        /* Akış / Yorumlar */
        #universe-feed {
            margin-top: 40px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column-reverse; /* Yeni mesajlar üstte */
            gap: 20px;
            margin-bottom: 50px;
        }

        .feed-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: fadeIn 0.8s ease;
        }

        .user-thought { font-family: 'Zen Old Mincho', serif; font-size: 1.1rem; color: #333; margin-bottom: 10px; }
        .soul-comment { font-style: italic; color: #7a8a9a; font-size: 0.95rem; border-left: 3px solid var(--accent); padding-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header-stats">RESONANCE: <span id="score">0</span></div>

    <div id="canvas-container">
        <div class="toolbar">
            <input type="color" id="colorPicker" onchange="currentColor = this.value">
            <input type="range" id="sizePicker" min="1" max="20" value="2" onchange="currentSize = this.value">
            <button onclick="undo()">↩ Geri</button>
            <button onclick="useEraser()">🧽 Silgi</button>
            <button onclick="clearCanvas()">🗑 Temizle</button>
        </div>
        <canvas id="paintCanvas" width="500" height="300"></canvas>
    </div>

    <div class="ui-panel">
        <div id="milestone-hint" style="font-size: 0.8rem; margin-bottom: 10px; color: #8b7d6b;">200 puan ile sanat araçlarını aç...</div>
        <input type="text" id="mottoInput" placeholder="İçinden geçen güzellikleri, pozitif düşünceleri evrene bırak...">
        <div class="action-btns">
            <button onclick="sendToUniverse()" style="background: var(--accent); font-weight: bold;">Evrene Gönder</button>
        </div>
    </div>

    <div id="universe-feed">
        <!-- Gönderiler buraya eklenecek -->
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let resonanceScore = 0;
        let currentColor = '#4a4a4a';
        let currentSize = 2;
        let canvasUnlocked = false;

        // Geri Alma İçin Geçmiş
        let history = [];

        function saveState() {
            if (history.length > 20) history.shift();
            history.push(canvas.toDataURL());
        }

        function undo() {
            if (history.length > 0) {
                let previousState = new Image();
                previousState.src = history.pop();
                previousState.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(previousState, 0, 0);
                };
            }
        }

        // Çizim
        canvas.addEventListener('mousedown', (e) => {
            saveState();
            painting = true;
            draw(e);
        });
        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentColor;

            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function useEraser() { currentColor = '#ffffff'; }

        function sendToUniverse() {
            const input = document.getElementById('mottoInput');
            const thought = input.value;
            if (!thought) return;

            resonanceScore += 50 + (thought.length * 2);
            document.getElementById('score').innerText = resonanceScore;

            // Beslemeye Ekle
            addToFeed(thought);
            
            // Kilit Kontrolü
            if (resonanceScore >= 200 && !canvasUnlocked) {
                canvasUnlocked = true;
                document.getElementById('canvas-container').style.display = 'flex';
                document.getElementById('milestone-hint').innerText = "Sanat araçları aktif. Renkleri ve fırçayı kullanabilirsin.";
            }

            input.value = "";
        }

        function addToFeed(thought) {
            const feed = document.getElementById('universe-feed');
            
            const comments = [
                "Bu düşünce evrende bir yıldız gibi parladı.",
                "Ruhunun bu yansıması çok ilham verici.",
                "Gönderdiğin bu pozitif enerji birinin gününü aydınlatacak.",
                "Zarif bir dokunuş, evren bu güzelliği saklayacak.",
                "Çizgilerin ve kelimelerin harika bir rezonans içinde."
            ];

            const item = document.createElement('div');
            item.className = 'feed-item';
            item.innerHTML = `
                <div class="user-thought">"${thought}"</div>
                <div class="soul-comment">✨ ${comments[Math.floor(Math.random() * comments.length)]}</div>
            `;
            feed.appendChild(item);
        }

        function clearCanvas() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
