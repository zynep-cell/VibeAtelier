<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VibeAtelier | Artisan Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfaf5; --ink: #4a4a4a; --accent: #d9e4f7; --gold: #d4af37; }
        body { background: #f0ece2; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; color: var(--ink); }
        
        /* Dashboard */
        .stats-bar { display: flex; gap: 20px; margin: 20px; padding: 10px 30px; background: white; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .score-box { font-weight: bold; color: var(--ink); }
        .shop-btn { cursor: pointer; color: var(--gold); font-weight: bold; }

        /* Atölye Alanı */
        #atelier-main { display: none; background: var(--paper); box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 20px; border-radius: 4px; animation: fadeIn 1s; }
        .canvas-wrapper { position: relative; }
        canvas { background: white; border: 1px solid #eee; cursor: crosshair; }

        /* Araç Kutusu */
        .tools { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; margin-bottom: 10px; }
        .tool-group { display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 10px; }
        
        /* Dükkan Paneli */
        #shop-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.2); z-index: 1000; width: 300px; }
        .shop-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .shop-item.locked { opacity: 0.5; cursor: not-allowed; }

        /* Akış */
        #universe-feed { width: 90%; max-width: 550px; margin-top: 30px; display: flex; flex-direction: column-reverse; gap: 15px; margin-bottom: 50px; }
        .feed-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border-left: 4px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="score-box">✨ Yankı: <span id="score">0</span></div>
        <div class="shop-btn" onclick="toggleShop()">🏪 Atölye Dükkanı</div>
    </div>

    <div id="atelier-main">
        <div class="tools">
            <div class="tool-group">
                <input type="color" id="brushColor" onchange="currentMode='brush'; currentColor=this.value">
                <input type="range" id="brushSize" min="1" max="50" value="2" onchange="currentSize=this.value">
            </div>
            <div class="tool-group" id="brush-types">
                <button onclick="currentMode='brush'">🖋 Mürekkep</button>
                <!-- Puanla açılacaklar buraya gelecek -->
            </div>
            <div class="tool-group" id="shapes-area" style="display: none;">
                <button onclick="currentMode='heart'">❤</button>
                <button onclick="currentMode='star'">⭐</button>
            </div>
            <button onclick="currentMode='eraser'">🧽 Silgi</button>
            <button onclick="undo()">↩ Geri</button>
        </div>
        <canvas id="canvas" width="550" height="350"></canvas>
    </div>

    <div class="ui-panel" style="margin-top: 20px; text-align: center;">
        <input type="text" id="mottoInput" style="width: 350px; padding: 15px; border: none; border-bottom: 2px solid #ddd; background: transparent; font-size: 1.1rem; outline: none;" placeholder="İçinden geçen güzellikleri evrene bırak...">
        <br><br>
        <button onclick="sendToUniverse()" style="padding: 12px 30px; border-radius: 30px; border: none; background: var(--accent); cursor: pointer;">Evrene Gönder</button>
        <p id="unlock-hint" style="font-size: 0.8rem; color: #999; margin-top: 10px;">İlk kilit için 100 puan topla...</p>
    </div>

    <div id="shop-overlay">
        <h3>Gelişim Atölyesi</h3>
        <div id="shop-list"></div>
        <button onclick="toggleShop()" style="margin-top: 20px; width: 100%;">Kapat</button>
    </div>

    <div id="universe-feed"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let painting = false;
        let currentMode = 'brush';
        let currentColor = '#4a4a4a';
        let currentSize = 2;
        let history = [];

        // Kilitler ve Dükkan Verisi
        const unlocks = [
            { pts: 100, name: "Atölye Kapısı", desc: "Tuval ve Mürekkep açıldı.", action: () => { document.getElementById('atelier-main').style.display = 'block'; } },
            { pts: 300, name: "Sulu Boya Fırçası", desc: "Şeffaf ve yumuşak geçişler.", action: () => addTool('Sulu Boya', 'watercolor') },
            { pts: 500, name: "Püskürtme (Spray)", desc: "Sanatsal dokular.", action: () => addTool('Püskürtme', 'spray') },
            { pts: 800, name: "Kutsal Şekiller", desc: "Kalp ve Yıldız damgaları.", action: () => document.getElementById('shapes-area').style.display = 'flex' },
            { pts: 1200, name: "Altın Mürekkep", desc: "Işıltılı bir dokunuş.", action: () => { currentColor = '#d4af37'; } }
        ];

        function sendToUniverse() {
            const input = document.getElementById('mottoInput');
            if(!input.value) return;

            score += 60 + (input.value.length * 2);
            document.getElementById('score').innerText = score;
            
            checkUnlocks();
            addToFeed(input.value);
            input.value = "";
        }

        function checkUnlocks() {
            unlocks.forEach(u => {
                if(score >= u.pts) u.action();
            });
            document.getElementById('unlock-hint').innerText = `Bir sonraki keşif için daha fazla enerji gönder...`;
        }

        function addTool(name, mode) {
            if(!document.getElementById('tool-'+mode)) {
                const btn = document.createElement('button');
                btn.id = 'tool-'+mode;
                btn.innerText = name;
                btn.onclick = () => { currentMode = mode; };
                document.getElementById('brush-types').appendChild(btn);
            }
        }

        // Çizim Motoru
        canvas.addEventListener('mousedown', (e) => { saveState(); painting = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });

        function draw(e) {
            if(!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';
            
            if(currentMode === 'brush') {
                ctx.strokeStyle = currentColor;
                ctx.globalAlpha = 1;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(currentMode === 'watercolor') {
                ctx.strokeStyle = currentColor;
                ctx.globalAlpha = 0.1;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(currentMode === 'spray') {
                ctx.fillStyle = currentColor;
                for(let i=0; i<15; i++) {
                    ctx.fillRect(x + Math.random()*20-10, y + Math.random()*20-10, 1, 1);
                }
            } else if(currentMode === 'heart') {
                ctx.font = `${currentSize*10}px serif`;
                ctx.fillText('❤', x, y);
                painting = false;
            } else if(currentMode === 'star') {
                ctx.font = `${currentSize*10}px serif`;
                ctx.fillText('⭐', x, y);
                painting = false;
            } else if(currentMode === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function addToFeed(thought) {
            const feed = document.getElementById('universe-feed');
            const responses = [
                "Zihnin bu kadar güzeli barındırırken dünya çok daha parlak.",
                "Bu pozitif yankı bir ruhun yarasına merhem olacak.",
                "Kelimelerin ve çizgilerin dansı evreni gülümsetti.",
                "Sessiz bir melodi gibi, bu eser huzur dağıtıyor.",
                "İçindeki ışığı yansıttığın için teşekkürler."
            ];
            const div = document.createElement('div');
            div.className = 'feed-item feed-card';
            div.innerHTML = `<strong>"${thought}"</strong><br><small>✨ ${responses[Math.floor(Math.random()*responses.length)]}</small>`;
            feed.appendChild(div);
        }

        function toggleShop() {
            const shop = document.getElementById('shop-overlay');
            shop.style.display = shop.style.display === 'block' ? 'none' : 'block';
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = "";
            unlocks.forEach(u => {
                const item = document.createElement('div');
                item.className = `shop-item ${score < u.pts ? 'locked' : ''}`;
                item.innerHTML = `<span>${u.name}</span> <span>${u.pts} Pts</span>`;
                list.appendChild(item);
            });
        }

        function saveState() { history.push(canvas.toDataURL()); if(history.length > 20) history.shift(); }
        function undo() { if(history.length > 0) { let img = new Image(); img.src = history.pop(); img.onload = () => { ctx.clearRect(0,0,550,350); ctx.drawImage(img,0,0); }; } }
    </script>
</body>
</html>
