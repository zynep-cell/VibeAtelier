<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VibeAtelier | Soul Bond</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfaf5; --ink: #4a4a4a; --gold: #d4af37; --pet-bg: #fff5f5; }
        body { background: #f0ece2; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Üst Panel & Pet */
        .header-container { display: flex; width: 90%; max-width: 900px; justify-content: space-between; align-items: flex-start; margin-top: 20px; }
        
        .stats-bar { background: white; padding: 15px 30px; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 20px; align-items: center; }
        
        #pet-zone { background: var(--pet-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 180px; border: 2px solid #ffeded; }
        #pet-avatar { font-size: 50px; margin-bottom: 10px; display: block; transition: transform 0.3s; }
        .pet-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .pet-fill { height: 100%; background: #ffadad; width: 100%; transition: width 0.5s; }

        /* Atölye */
        #atelier-main { display: none; background: var(--paper); box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .tools { display: flex; gap: 8px; padding: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; max-width: 600px; justify-content: center; }
        canvas { background: white; border: 1px solid #eee; cursor: crosshair; }

        /* Butonlar & Shop */
        button { padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        button:hover { background: #f0f4f8; }
        .shop-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.3); z-index: 1000; width: 350px; max-height: 80vh; overflow-y: auto; }

        /* Feed */
        #universe-feed { width: 90%; max-width: 500px; margin-top: 20px; display: flex; flex-direction: column-reverse; gap: 10px; padding-bottom: 50px; }
        .feed-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="stats-bar">
            <div style="font-weight: bold;">✨ Yankı: <span id="score">0</span></div>
            <div onclick="toggleShop()" style="cursor:pointer; color: var(--gold); font-weight:bold;">🏪 Keşif Dükkanı</div>
        </div>

        <div id="pet-zone">
            <span id="pet-avatar">🐣</span>
            <div style="font-size: 12px; font-weight: bold; color: #8b7d6b;">VibeBuddy</div>
            <div class="pet-bar"><div id="energy-fill" class="pet-fill"></div></div>
            <div style="font-size: 10px; margin-top: 5px;">Enerji Seviyesi</div>
        </div>
    </div>

    <div id="atelier-main">
        <div class="tools">
            <input type="color" id="brushColor" onchange="currentMode='brush'; currentColor=this.value">
            <input type="range" id="brushSize" min="1" max="50" value="3">
            <button onclick="setMode('brush')">🖋 Mürekkep</button>
            <span id="unlocked-tools"></span>
            <button onclick="undo()">↩ Geri</button>
        </div>
        <canvas id="canvas" width="550" height="300"></canvas>
    </div>

    <div class="ui-panel" style="margin-top: 20px; text-align: center;">
        <input type="text" id="mottoInput" style="width: 300px; padding: 12px; border: none; border-bottom: 2px solid #ddd; background: transparent; font-size: 1.1rem; outline: none;" placeholder="İçindeki güzellikleri paylaş...">
        <button onclick="sendToUniverse()" style="padding: 10px 25px; border-radius: 30px; border: none; background: #d9e4f7; cursor: pointer; font-weight: bold; margin-left: 10px;">Evrene Gönder</button>
        <p id="unlock-hint" style="font-size: 0.8rem; color: #999; margin-top: 10px;">Evcil dostun acıkıyor, pozitif enerji gönder!</p>
    </div>

    <div id="shop-overlay" class="shop-overlay">
        <h3 style="font-family: 'Zen Old Mincho', serif;">Gelişim & Yaşam</h3>
        <div id="shop-list"></div>
        <button onclick="toggleShop()" style="margin-top: 20px; width: 100%;">Kapat</button>
    </div>

    <div id="universe-feed"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let petEnergy = 100;
        let painting = false;
        let currentMode = 'brush';
        let currentColor = '#4a4a4a';
        let currentSize = 3;
        let history = [];

        // Kilitler
        const unlocks = [
            { pts: 100, id: 'canvas', name: "Atölye Girişi", desc: "Çizim alanı açılır." },
            { pts: 250, id: 'pet_toy', name: "Renkli Top", desc: "Buddy neşelenir (🐣 -> 🐥)." },
            { pts: 450, id: 'glitter', name: "Simli Altın", desc: "Parıltılı fırça açılır." },
            { pts: 700, id: 'shapes_pack', name: "Şekil Paketi", desc: "Kalp, Yıldız, Bulut." },
            { pts: 1000, id: 'pet_cloth', name: "Zarif Şapka", desc: "Buddy daha şık (🐥 -> 🐤)." },
            { pts: 1500, id: 'zen_patterns', name: "Zen Desenler", desc: "Çiçek, Yaprak, Sarmal." },
            { pts: 2000, id: 'oil_paint', name: "Yağlı Boya", desc: "Yoğun dokulu fırça." }
        ];

        // Pet Enerji Düşüşü (Her 10 saniyede bir enerji azalır)
        setInterval(() => {
            if(petEnergy > 0) {
                petEnergy -= 2;
                updatePetUI();
            }
        }, 10000);

        function sendToUniverse() {
            const input = document.getElementById('mottoInput');
            if(!input.value) return;

            score += 80 + (input.value.length * 2);
            petEnergy = Math.min(100, petEnergy + 20); // Her gönderi enerji verir
            
            document.getElementById('score').innerText = score;
            updatePetUI();
            checkUnlocks();
            addToFeed(input.value);
            
            // Pet Mutluluk Animasyonu
            document.getElementById('pet-avatar').style.transform = "scale(1.3)";
            setTimeout(() => document.getElementById('pet-avatar').style.transform = "scale(1)", 300);
            
            input.value = "";
        }

        function updatePetUI() {
            document.getElementById('energy-fill').style.width = petEnergy + "%";
            const avatar = document.getElementById('pet-avatar');
            if(score >= 1000) avatar.innerText = "🐤";
            else if(score >= 250) avatar.innerText = "🐥";
            
            if(petEnergy < 30) avatar.style.filter = "grayscale(100%)";
            else avatar.style.filter = "none";
        }

        function checkUnlocks() {
            unlocks.forEach(u => {
                if(score >= u.pts) {
                    if(u.id === 'canvas') document.getElementById('atelier-main').style.display = 'block';
                    if(u.id === 'glitter') addTool('✨ Simli Altın', 'glitter');
                    if(u.id === 'shapes_pack') { addTool('❤', 'heart'); addTool('⭐', 'star'); addTool('☁', 'cloud'); }
                    if(u.id === 'zen_patterns') { addTool('🌸', 'flower'); addTool('🌿', 'leaf'); }
                    if(u.id === 'oil_paint') addTool('🎨 Yağlı Boya', 'oil');
                }
            });
        }

        function addTool(name, mode) {
            if(!document.getElementById('btn-'+mode)) {
                const btn = document.createElement('button');
                btn.id = 'btn-'+mode;
                btn.innerText = name;
                btn.onclick = () => { 
                    currentMode = mode; 
                    if(mode === 'glitter') currentColor = '#d4af37';
                };
                document.getElementById('unlocked-tools').appendChild(btn);
            }
        }

        // Çizim Motoru
        canvas.addEventListener('mousedown', (e) => { saveState(); painting = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });

        function draw(e) {
            if(!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = currentSize;
            ctx.lineCap = 'round';

            if(currentMode === 'brush') {
                ctx.strokeStyle = currentColor;
                ctx.globalAlpha = 1;
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if(currentMode === 'glitter') {
                // Parıltılı Efekt: Ana çizgi + etrafına rastgele simler
                ctx.strokeStyle = '#d4af37';
                ctx.lineTo(x, y);
                ctx.stroke();
                for(let i=0; i<5; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#ffd700';
                    ctx.fillRect(x + Math.random()*20-10, y + Math.random()*20-10, 2, 2);
                }
            } else if(['heart', 'star', 'cloud', 'flower', 'leaf'].includes(currentMode)) {
                const icons = {heart:'❤', star:'⭐', cloud:'☁', flower:'🌸', leaf:'🌿'};
                ctx.font = `${currentSize * 5}px serif`;
                ctx.fillStyle = currentColor;
                ctx.fillText(icons[currentMode], x, y);
                painting = false;
            } else if(currentMode === 'oil') {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize * 2;
                ctx.globalAlpha = 0.4;
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function addToFeed(thought) {
            const feed = document.getElementById('universe-feed');
            const items = ["Evren bu ışığı sakladı.", "Dostun bu enerjiyi çok sevdi!", "Zarif bir dokunuş.", "Huzur yayıldı..."];
            const div = document.createElement('div');
            div.className = 'feed-card';
            div.innerHTML = `<strong>"${thought}"</strong><br><small>✨ ${items[Math.floor(Math.random()*items.length)]}</small>`;
            feed.appendChild(div);
        }

        function toggleShop() {
            const shop = document.getElementById('shop-overlay');
            shop.style.display = shop.style.display === 'block' ? 'none' : 'block';
            const list = document.getElementById('shop-list');
            list.innerHTML = unlocks.map(u => `<div style="padding:10px; border-bottom:1px solid #eee; color:${score >= u.pts ? '#2ecc71' : '#999'}">${score >= u.pts ? '✅' : '🔒'} ${u.name} (${u.pts} Pts)</div>`).join('');
        }

        function saveState() { history.push(canvas.toDataURL()); if(history.length > 10) history.shift(); }
        function undo() { if(history.length > 0) { let img = new Image(); img.src = history.pop(); img.onload = () => { ctx.clearRect(0,0,550,300); ctx.drawImage(img,0,0); }; } }
    </script>
</body>
</html>
